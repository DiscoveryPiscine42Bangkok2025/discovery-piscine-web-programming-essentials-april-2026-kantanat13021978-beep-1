<!DOCTYPE html>
<html>
<head>
  <title>Tab</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
    }

    .container {
      display: flex;
      height: 100vh; 
      width: 100vw;  
    }

    .panel-green {
      flex: 1; 
      background-color: green;
      display: flex;
      justify-content: center; 
      align-items: center;    
      border: 5px solid black; 
      box-sizing: border-box; 
    }

    .panel-red {
      flex: 1; 
      background-color: red;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 5px solid black;
      border-left: none;
      box-sizing: border-box;
    }

    p {
      font-family: 'Courier New', Courier, monospace;
      font-size: 3rem;
      font-weight: bold;
      margin: 0;
    }

    .text-brown { color: brown; }
    .text-blue { color: blue; }

    @media (max-width: 600px) {
      .container {
        flex-direction: column;
      }
      .panel-red {
        border-left: 5px solid black;
        border-top: none;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    
    <div class="panel-green">
      <p class="text-brown">skibidi</p>
    </div>

    <div class="panel-red">
      <p class="text-blue">sigma</p>
    </div>

  </div>

</body>
</html>
