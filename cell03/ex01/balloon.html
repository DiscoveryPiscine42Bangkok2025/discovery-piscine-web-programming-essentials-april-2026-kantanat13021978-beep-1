<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Changing Balloon</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f2f5;
    }

    #balloon {
      width: 200px;
      height: 200px;
      background-color: red;
      border-radius: 50%;
      cursor: pointer;
      transition: width 0.1s, height 0.1s, background-color: 0.3s;
    }
  </style>
</head>
<body>

  <div id="balloon"></div>

  <script>
    const balloon = document.getElementById('balloon');

    let currentSize = 200;
    const colors = ['red', 'green', 'blue'];
    let colorIndex = 0;

    balloon.addEventListener('click', () => {
      currentSize += 10;
      if (currentSize > 420) {
        currentSize = 200;
      }

      colorIndex += 1;
      if (colorIndex > 2) {
        colorIndex = 0;
      }
      
      updateBalloon();
    });

    balloon.addEventListener('mouseleave', () => {
      // Handle size
      currentSize -= 5;

      if (currentSize < 200) {
        currentSize = 200; 
      }

      colorIndex -= 1;
      if (colorIndex < 0) {
        colorIndex = 2;
      }
      
      updateBalloon();
    });

    function updateBalloon() {
      balloon.style.width = currentSize + 'px';
      balloon.style.height = currentSize + 'px';
      balloon.style.backgroundColor = colors[colorIndex];
    }
  </script>

</body>
</html>
